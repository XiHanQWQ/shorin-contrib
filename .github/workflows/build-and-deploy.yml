name: Build and Deploy shorin-contrib-git

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel

    steps:
      - name: Prepare environment
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm aws-cli sudo git
          useradd -m builder
          mkdir -p /etc/sudoers.d
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder
          mkdir -p /build /release
          chown -R builder:builder /build /release

      - name: Configure GPG
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          echo "pinentry-mode loopback" > ~/.gnupg/gpg-agent.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf

      - name: Fetch and Compile AUR Package
        run: |
          cd /build
          sudo -u builder git clone "https://aur.archlinux.org/shorin-contrib-git.git"
          cd shorin-contrib-git
          sudo -u builder bash -c "makepkg -s --noconfirm"

      - name: Sign and Update Database
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          find /build/shorin-contrib-git -name "*.pkg.tar.zst" -exec mv {} /release/ \;
          cd /release

          if ! ls *.pkg.tar.zst >/dev/null 2>&1; then
            echo "Error: Package compilation failed." >&2
            exit 1
          fi

          # Sign each package
          for PKG in *.pkg.tar.zst; do
            gpg --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --detach-sign --no-armor "$PKG"
          done

          # Fetch existing databases from R2 (ignore errors on first run)
          aws s3 cp s3://shorin-arch-repo/archlinux/x86_64/shorin-arch.db.tar.gz ./shorin-arch.db.tar.gz \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com || echo "New DB"
          aws s3 cp s3://shorin-arch-repo/archlinux/x86_64/shorin-arch.files.tar.gz ./shorin-arch.files.tar.gz \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com || echo "New files DB"

          # repo-add updates both .db.tar.gz and .files.tar.gz, and signs them (--sign)
          # It also creates .db / .files as hardlinks to the .tar.gz versions
          repo-add --sign --key 8ED9ABE61CDBAABAC4B6A694C9218E60C13B4BA8 shorin-arch.db.tar.gz *.pkg.tar.zst

          # Overwrite the hardlinks with real copies, then sign them
          cp --remove-destination shorin-arch.db.tar.gz shorin-arch.db
          cp --remove-destination shorin-arch.files.tar.gz shorin-arch.files
          gpg --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --detach-sign --no-armor shorin-arch.db
          gpg --pinentry-mode loopback --passphrase "${{ secrets.GPG_PASSPHRASE }}" --detach-sign --no-armor shorin-arch.files

      - name: Clean up old packages on R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          # List all .pkg.tar.zst on R2, delete old versions not present locally
          cd /release
          LOCAL_PKGS=$(ls *.pkg.tar.zst 2>/dev/null | sort)

          R2_PREFIX="s3://shorin-arch-repo/archlinux/x86_64/"
          ENDPOINT="--endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"

          for R2_OBJ in $(aws s3 ls ${R2_PREFIX} ${ENDPOINT} | awk '{print $4}' | grep '\.pkg\.tar\.zst$'); do
            # Skip if this package exists locally (current version)
            if echo "$LOCAL_PKGS" | grep -qxF "$R2_OBJ"; then
              continue
            fi
            echo "Removing old package: $R2_OBJ"
            aws s3 rm "${R2_PREFIX}${R2_OBJ}" ${ENDPOINT}
            # Also remove its signature if present
            aws s3 rm "${R2_PREFIX}${R2_OBJ}.sig" ${ENDPOINT} 2>/dev/null || true
          done

      - name: Sync to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          cd /release
          aws s3 cp . s3://shorin-arch-repo/archlinux/x86_64/ \
            --recursive \
            --include "*" \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com